services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: cv_mgmt_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cv_management}
      POSTGRES_USER: ${POSTGRES_USER:-cv_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cv_password}
    ports:
      - "5433:5432"          # porta host 5433 per non collidere con IT_RESOURCE_MGMT (5432)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cv_user} -d ${POSTGRES_DB:-cv_management}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend FastAPI ────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: cv_mgmt_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-cv_user}:${POSTGRES_PASSWORD:-cv_password}@db:5432/${POSTGRES_DB:-cv_management}
      CORS_ORIGINS: "http://localhost:8082,http://localhost:5174"
      AI_SERVICE_URL: http://ai-services:8000
      UPLOAD_DIR: /app/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8002:8000"          # porta host 8002 (8000=IT_RM, 8001=YATO)
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  # ── AI Services (CV parsing) ───────────────────────────────────────────────
  ai-services:
    build: ./ai-services
    container_name: cv_mgmt_ai
    restart: unless-stopped
    env_file: .env
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      UPLOAD_DIR: /app/uploads
    ports:
      - "8003:8000"          # porta host 8003
    volumes:
      - uploads_data:/app/uploads   # accede agli stessi file del backend
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Frontend React + Nginx ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: cv_mgmt_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8082:80"            # porta host 8082 (8080=IT_RM)

volumes:
  postgres_data:             # dati PostgreSQL persistenti
  uploads_data:              # documenti CV caricati (condiviso tra backend e ai-services)
