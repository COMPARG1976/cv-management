server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API → backend (rete Docker interna)
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Timeout generosi per chiamate AI (parsing può richiedere 30-60s)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Asset con cache lunga (hash nel filename da Vite)
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html senza cache (deve sempre servire versione fresca)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback — tutte le route → index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
